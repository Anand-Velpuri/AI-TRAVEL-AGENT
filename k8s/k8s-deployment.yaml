apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
spec:
  replicas: 1
  selector:
    matchLabels:
      name: streamlit-app
  template:
    metadata:
      labels:
        name: streamlit-app
    spec:
      containers:
      - name: streamlit-container
        image: streamlit-app:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8501
        envFrom:
          - secretRef:
              name: llmops-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
spec:
  type: LoadBalancer
  selector:
    name: streamlit-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501